<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EssayBot Report Generator</title>
    <style>
      body {
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 0;
        background: #fbfbfb;
        color: #111;
      }
      .page {
        max-width: 900px;
        margin: 0 auto;
        padding: 2rem 1.25rem;
      }
      h1 {
        margin-bottom: 0.25rem;
      }
      p {
        line-height: 1.75;
        color: #444;
      }
      form {
        margin-top: 1rem;
        display: grid;
        gap: 0.75rem;
      }
      input[type="text"] {
        width: 100%;
        padding: 0.9rem 1rem;
        font-size: 1rem;
        border: 1px solid #d1d5db;
        border-radius: 0.65rem;
      }
      button {
        width: fit-content;
        padding: 0.9rem 1.25rem;
        border: none;
        border-radius: 0.75rem;
        background: #2563eb;
        color: white;
        font-size: 1rem;
        cursor: pointer;
      }
      .report {
        margin-top: 1.75rem;
        padding: 1.35rem;
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 1rem;
        white-space: pre-wrap;
        line-height: 1.65;
      }
      .error {
        color: #b91c1c;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <h1>EssayBot Report Generator</h1>
      <p>Type a topic below and generate a structured report from the LLM.</p>

      <form action="/generate" method="post">
        <label for="topic">Report topic</label>
        <input
          type="text"
          id="topic"
          name="topic"
          value="{{ topic or '' }}"
          placeholder="e.g. renewable energy policy"
          required
        />
        <button type="submit">Generate report</button>
      </form>

      {% if error %}
      <p class="error">{{ error }}</p>
      {% endif %}

      {% if report %}
      <h2>Report on "{{ topic }}"</h2>
      <div class="report">{{ report }}</div>
      {% endif %}
    </div>
  </body>
</html>
